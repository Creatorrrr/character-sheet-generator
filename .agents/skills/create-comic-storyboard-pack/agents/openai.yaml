interface:
  display_name: "Comic Storyboard Pack"
  short_description: "Coordinate a resumable Korean comic page pack"
  default_prompt: "Use $create-comic-storyboard-pack to plan approved Korean comic pages from a story or scenario with narrative-first page/panel design, character appearance/anatomy locks, and spatial_contract as a validation overlay after composition is chosen; manage runner state, reserve subagent batches, parent-inspect outputs, and gate finish until the user reviews storyboard_sketch_ink. Delegate image generation to $create-comic-storyboard-sketch-ink and $create-comic-storyboard-finish. Use sources/ when no source path is specified, and do not use output/ as source data."
